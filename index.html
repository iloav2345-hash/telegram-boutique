<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
       body { 
            font-family: sans-serif; 
            padding: 20px; 
            /* --- NOUVEAU : LE FOND AVEC IMAGE --- */
            /* 1. On garde une couleur de secours si l'image ne charge pas */
            background-color: #1a1a1a; 
            /* 2. REMPLACE 'fond-boutique.jpg' PAR LE NOM EXACT DE TON FICHIER SUR GITHUB */
            background-image: url('fond-boutique.png'); 
            /* 3. On demande à l'image de couvrir tout l'écran, sans se déformer */
            background-size: cover; 
            /* 4. On centre l'image */
            background-position: center; 
            /* 5. Optionnel mais sympa : l'image reste fixe quand on scrolle */
            background-attachment: fixed;
            
            /* On enlève l'adaptation automatique au thème de Telegram pour le fond */
            color: white; /* On force le texte de base en blanc pour qu'il soit lisible sur le fond */
            margin-bottom: 100px; /* Marge pour le panier */
        }

        /* --- 1. L'ANIMATION DE CHANGEMENT DE PAGE --- */
        .page { 
            display: none; 
            /* On ajoute une animation appelée 'fadeIn' qui dure 0.3 secondes */
            animation: fadeIn 0.3s ease-in-out; 
        }
        #page-categories { display: block; }

        /* On crée l'animation : ça part de transparent/plus bas, et ça monte */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 3. L'EFFET DE CLIC SUR TOUS LES BOUTONS --- */
        button { 
            background-color: var(--tg-theme-button-color); 
            color: var(--tg-theme-button-text-color); 
            border: none; 
            padding: 12px; 
            border-radius: 12px; /* Coins un peu plus ronds */
            cursor: pointer; 
            width: 100%; 
            margin-top: 10px; 
            font-size: 16px; 
            font-weight: bold;
            
            /* On prépare le bouton à être animé */
            transition: transform 0.1s ease, filter 0.1s ease, box-shadow 0.1s ease;
        }

        /* QUE SE PASSE-T-IL QUAND ON APPUIE (ACTIVE) SUR LE BOUTON ? */
        button:active {
            transform: scale(0.95); /* Le bouton rétrécit de 5% (effet d'enfoncement) */
            filter: brightness(0.8); /* Il s'assombrit un peu */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* L'ombre diminue */
        }
        
        /* --- NOUVEAU : STYLE DU TITRE DE LA BOUTIQUE --- */
        .shop-header { text-align: center; margin-bottom: 25px; }
        .shop-title {
            font-size: 2.5em; 
            font-weight: bold;
            /* Effet néon stylé */
            background: linear-gradient(45deg, #33CAFF, #8a2be2);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
            margin: 0;
        }
        
        .product { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; text-align: center;}
        
        /* --- NOUVEAU : STYLE POUR LES PHOTOS --- */
        .product-img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; max-height: 200px; }

        /* Style des boutons */
        button { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; font-weight: bold;}
        .btn-retour { background-color: #555; margin-bottom: 20px; } 
        
        /* --- NOUVEAU : STYLE DES BOUTONS DE CATÉGORIE --- */
        .btn-category {
            padding: 16px; /* Boutons un peu plus gros */
            font-size: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); /* Petite ombre portée stylée */
            color: white !important; /* Force le texte en blanc pour bien lire sur la couleur */
            text-transform: uppercase; /* Met le texte en majuscules */
            letter-spacing: 1px; /* Espace un peu les lettres */
            border: 2px solid rgba(255,255,255,0.2); /* Petite bordure transparente */
        }
        
        /* Des couleurs différentes pour chaque bouton ! */
        .btn-cat1 {
            background: linear-gradient(45deg, #FF512F, #D90916); /* Dégradé Rouge/Rose */
        }
        
        .btn-cat2 {
            background: linear-gradient(45deg, #4EDEFC, #0493B3); /* Dégradé Vert/Menthe */
        }
        
        .btn-cat3 {
            background: linear-gradient(45deg, #4776E6, #8E54E9); /* Dégradé Bleu/Violet au cas où tu as une 3ème catégorie */
        }
        
        /* --- STYLE DU PANIER FIXE EN BAS --- */
        #cart { 
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--tg-theme-bg-color); padding: 15px;
            border-top: 2px solid #ccc; box-shadow: 0 -5px 10px rgba(0,0,0,0.2);
            box-sizing: border-box; z-index: 100;
        }
        #cart h3, #cart p { margin: 5px 0; text-align: center; }
        
        /* Navigation */
        .page { display: none; }
        #page-categories { display: block; }
    </style>
</head>
<body>

    <div class="shop-header">
        <h1 class="shop-title">SkiLandes</h1>
    </div>

    <div id="page-categories" class="page">
        <h2 style="color: red; text-align: center;">Que cherchez-vous ?</h2>
        
        <button class="btn-category btn-cat1" onclick="ouvrirPage('page-produits1')">🍫 Hash</button>
        
        <button class="btn-category btn-cat2" onclick="ouvrirPage('page-accessoires')">❄️ Zip</button>
    </div>

    <div id="page-produits1" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour aux catégories</button>
        <h2 style="color: red; text-align: center;">🍫 Hash</h2>
        
        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Photo+Produit" alt="Produit A" class="product-img">
            <p><strong>Static 10G - 90€</strong></p>
            <button onclick="addToCart('Static', 90)">Ajouter au panier</button>
        </div>
        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Photo+Bientot" alt="Bientôt" class="product-img">
            <p><strong>Bientôt - ??€</strong></p>
            <button onclick="addToCart('Bientot 1', 0)">Ajouter au panier</button>
        </div>
    </div>

    <div id="page-accessoires" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour aux catégories</button>
        <h2 style="text-align: center;">❄️ Zip</h2>
        
        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Photo+Accessoire" alt="Accessoire" class="product-img">
            <p><strong>Bientôt - ??€</strong></p>
            <button onclick="addToCart('Bientot 2', 0)">Ajouter au panier</button>
        </div>
    </div>

    <div id="cart">
        <h3>Panier (<span id="cart-count">0</span> articles)</h3>
        <p>Total : <strong><span id="cart-total">0</span>€</strong></p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let cart = [];
        let total = 0;

        function ouvrirPage(idPage) {
            let pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            document.getElementById(idPage).style.display = 'block';
            window.scrollTo(0, 0); 
        }

        function addToCart(name, price) {
            cart.push({name: name, price: price});
            total += price;
            
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;

            tg.MainButton.setText(`Valider la commande (${total}€)`);
            tg.MainButton.show();
        }

        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        });
    </script>
</body>
</html>
