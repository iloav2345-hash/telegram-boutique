<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .product { border: 1px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 8px; }
        
        /* Style des boutons */
        button { background-color: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; font-weight: bold;}
        .btn-retour { background-color: #555; margin-bottom: 20px; } /* Bouton gris pour le retour */
        
        #cart { margin-top: 20px; padding-top: 20px; border-top: 2px solid #ccc; }
        
        /* LA MAGIE EST ICI : On cache les pages par défaut */
        .page { display: none; }
        /* On force la page des catégories à être visible au démarrage */
        #page-categories { display: block; }
    </style>
</head>
<body>

    <div id="page-categories" class="page">
        <h2 style="color: red;">Que cherchez-vous ?</h2>
        <button onclick="ouvrirPage('page-vetements')">👕 Vêtements</button>
        <button onclick="ouvrirPage('page-accessoires')">🧢 Accessoires</button>
    </div>

    <div id="page-vetements" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour aux catégories</button>
        <h2 style="color: red;">🍫 Hash</h2>
        
        <div class="product">
            <p>Static 10G - 90€</p>
            <button onclick="addToCart('Static 10G', 90)">Ajouter au panier</button>
        </div>
        <div class="product">
            <p>Bientot - ??€</p>
            <button onclick="addToCart('Bientot', 0)">Ajouter au panier</button>
        </div>
    </div>

    <div id="page-accessoires" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour aux catégories</button>
        <h2>🧢 Accessoires</h2>
        
        <div class="product">
            <p>Casquette - 10€</p>
            <button onclick="addToCart('Casquette', 10)">Ajouter au panier</button>
        </div>
    </div>

    <div id="cart">
        <h3>Panier (<span id="cart-count">0</span> articles)</h3>
        <p>Total : <span id="cart-total">0</span>€</p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let cart = [];
        let total = 0;

        // Fonction pour naviguer entre les "pages"
        function ouvrirPage(idPage) {
            // 1. On dit à toutes les sections de se cacher
            let pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            
            // 2. On affiche uniquement la section qu'on a demandée
            document.getElementById(idPage).style.display = 'block';
            
            // Petite option sympa : on remonte en haut de la page quand on change de catégorie
            window.scrollTo(0, 0); 
        }

        // Fonction du panier (inchangée)
        function addToCart(name, price) {
            cart.push({name: name, price: price});
            total += price;
            
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = total;

            tg.MainButton.setText(`Valider la commande (${total}€)`);
            tg.MainButton.show();
        }

        // Envoi au bot
        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify(cart));
            tg.close();
        });
    </script>
</body>
</html>
