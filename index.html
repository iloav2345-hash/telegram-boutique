<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- LE FOND --- */
        body {
            /* N'OUBLIE PAS DE METTRE LE VRAI NOM DE TON IMAGE ICI */
            background-image: url('fond-boutique.png?v=2'); 
            background-color: #0a0a0a; 
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            padding-top: 30vh; 
            padding-bottom: 80px; 
        }

        /* --- VERRE DÉPOLI --- */
        .glass-card {
            background: rgba(15, 15, 15, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 50, 50, 0.35); 
            border-radius: 20px;
            padding: 25px 20px;
            margin: 0 auto 25px auto;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* --- BOUTONS --- */
        .btn-red-glow {
            background: linear-gradient(135deg, rgba(220, 20, 36, 0.9), rgba(150, 0, 0, 0.9));
            color: white;
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); 
            transition: all 0.2s ease;
        }

        .btn-red-glow:active {
            transform: scale(0.96);
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(30, 30, 30, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        /* --- TEXTES --- */
        h2 {
            color: #ff4d4d;
            letter-spacing: 2px;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        /* --- PRODUITS --- */
        .product-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .input-dark {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            width: 90%;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        /* --- PANIER FLOTTANT --- */
        #cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff4b4b, #cc0000);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.5);
            cursor: pointer;
            z-index: 1000;
            display: none; 
        }
        #cart-count-float {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: white;
            color: #cc0000;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- GESTION DES PAGES --- */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="page-categories" class="page active">
        <div class="glass-card">
            <h2>Que cherchez-vous ?</h2>

            <button class="btn-red-glow" onclick="ouvrirPage('page-sous-categories')">
                🔥 Menu Produits
            </button>
            
            <button class="btn-secondary" onclick="ouvrirPage('page-infos')">
                ℹ️ Informations
            </button>
        </div>
    </div>

    <div id="page-sous-categories" class="page">
        <div class="glass-card">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Accueil</button>
            
            <h2>NOS CATÉGORIES</h2>

            <button class="btn-red-glow" onclick="ouvrirPage('page-categorie-1')">
                🌿 Catégorie 1
            </button>
            
            <button class="btn-red-glow" onclick="ouvrirPage('page-categorie-2')">
                🍫 Catégorie 2
            </button>
        </div>
    </div>

    <div id="page-categorie-1" class="page">
        <div class="glass-card" style="padding: 15px;">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-sous-categories')">⬅️ Retour</button>
            
            <h2 style="color: white;">🌿 Catégorie 1</h2>

            <div style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px;">
                <img src="https://via.placeholder.com/300x200/222222/ff4d4d?text=Photo+Produit+1" alt="Produit 1" class="product-img">
                <p style="font-weight: 600; font-size: 18px; margin: 5px 0;">Premium G</p>
                
                <select id="choix-produit-1" class="input-dark">
                    <option value="10" data-nom="Premium G (1g)">⚖️ 1 gramme - 10€</option>
                    <option value="45" data-nom="Premium G (5g)">⚖️ 5 grammes - 45€</option>
                </select>

                <button class="btn-red-glow" style="padding: 10px; font-size: 14px;" onclick="ajouterChoixAuPanier('choix-produit-1')">Ajouter au panier</button>
            </div>
        </div>
    </div>

    <div id="page-categorie-2" class="page">
        <div class="glass-card" style="padding: 15px;">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-sous-categories')">⬅️ Retour</button>
            
            <h2 style="color: white;">🍫 Catégorie 2</h2>

            <div>
                <img src="https://via.placeholder.com/300x200/222222/ff4d4d?text=Photo+Produit+2" alt="Produit 2" class="product-img">
                <p style="font-weight: 600; font-size: 18px; margin: 5px 0;">Filtre X</p>
                
                <select id="choix-produit-2" class="input-dark">
                    <option value="20" data-nom="Filtre X (2g)">⚖️ 2 grammes - 20€</option>
                    <option value="50" data-nom="Filtre X (5g)">⚖️ 5 grammes - 50€</option>
                </select>

                <button class="btn-red-glow" style="padding: 10px; font-size: 14px;" onclick="ajouterChoixAuPanier('choix-produit-2')">Ajouter au panier</button>
            </div>
        </div>
    </div>

    <div id="page-infos" class="page">
        <div class="glass-card" style="text-align: left;">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Retour</button>
            
            <h2 style="text-align: center;">ℹ️ Informations</h2>
            
            <p style="color: #ff4d4d; font-weight: bold; margin-bottom: 5px;">🕒 Horaires</p>
            <p style="font-size: 14px; color: #ccc;">Ouvert tous les jours de 10h à 22h.</p>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
            
            <p style="color: #ff4d4d; font-weight: bold; margin-bottom: 5px;">💳 Paiement</p>
            <p style="font-size: 14px; color: #ccc;">Espèces à la livraison ou Crypto.</p>
        </div>
    </div>

    <div id="page-cart" class="page">
        <div class="glass-card">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Continuer mes achats</button>
            
            <h2>🛒 Mon Panier</h2>
            
            <div id="cart-items-list" style="margin-bottom: 20px; text-align: left;"></div>
            
            <h3 style="border-top: 1px solid rgba(255,50,50,0.3); padding-top: 15px; color: white;">Total : <span id="cart-total-page" style="color: #ff4d4d;">0</span>€</h3>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <p style="text-align: left; margin-bottom: 5px; font-size: 14px; color: #aaa;">📍 Informations de livraison :</p>
            <textarea id="client-info" class="input-dark" rows="3" placeholder="Adresse complète, code porte, ville..."></textarea>
            
            <p style="text-align: left; margin-bottom: 5px; font-size: 14px; color: #aaa;">💳 Moyen de paiement :</p>
            <select id="payment-method" class="input-dark">
                <option value="Espèces">Espèces à la livraison</option>
                <option value="Crypto">Crypto (BTC / USDT)</option>
            </select>
        </div>
    </div>

    <div id="cart-float" onclick="ouvrirPage('page-cart')">
        🛒<span id="cart-count-float">0</span>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let cart = [];
        let total = 0;

        function ouvrirPage(idPage) {
            document.querySelectorAll('.page').forEach(page =>
