<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkiLandes</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            background-color: #1a1a1a; 
            background-image: url('fond-boutique.png'); /* Ton image de fond */
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed;
            color: white; 
            margin-bottom: 50px; 
        }
        
        .shop-header { text-align: center; margin-bottom: 25px; }
        .shop-title {
            font-size: 2.5em; 
            font-weight: bold;
            background: linear-gradient(45deg, #33CAFF, #8a2be2);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
            margin: 0;
        }
        
        .product { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 16px; 
            text-align: center;
            color: white; 
        }
        
        .product-img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 10px; max-height: 200px; }

        button { 
            background-color: var(--tg-theme-button-color); 
            color: var(--tg-theme-button-text-color); 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 10px; 
            font-size: 16px; 
            font-weight: bold;
            transition: transform 0.1s ease, filter 0.1s ease, box-shadow 0.1s ease;
        }

        button:active {
            transform: scale(0.95); 
            filter: brightness(0.8); 
        }

        .btn-retour { background-color: #555; margin-bottom: 20px; } 

        .btn-category {
            padding: 16px; 
            font-size: 18px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            color: white !important; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            border: 2px solid rgba(255,255,255,0.2); 
        }
        .btn-cat1 { background: linear-gradient(45deg, #FF512F, #BD1B00); }
        .btn-cat2 { background: linear-gradient(45deg, #2AEEF5, #009EA3); }

        .page { 
            display: none; 
            animation: fadeIn 0.3s ease-in-out; 
        }
        #page-categories { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- NOUVEAU : LE BOUTON PANIER FLOTTANT --- */
        #cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(45deg, #FF9933, #FF512F);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            z-index: 1000;
            font-weight: bold;
            display: none; /* Caché au début si le panier est vide */
            border: 2px solid white;
        }

        /* Style pour les champs de texte du panier */
        .input-field {
            width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px;
            border-radius: 8px; border: none; box-sizing: border-box; 
            font-family: sans-serif; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="shop-header">
        <h1 class="shop-title">SkiLandes</h1>
    </div>

    <div id="cart-float" onclick="ouvrirPage('page-cart')">
        🛒 Panier (<span id="cart-count-float">0</span>)
    </div>

    <div id="page-categories" class="page">
        <h2 style="color: rgb(214, 1, 1); text-align: center; text-shadow: 2px 2px 8px rgba(0,0,0,0.9);">Que cherchez-vous ?</h2>
        <button class="btn-category btn-cat1" onclick="ouvrirPage('page-produits1')">🍫 Hash</button>
        <button class="btn-category btn-cat2" onclick="ouvrirPage('page-accessoires')">❄️ Zip</button>
    </div>

    <div id="page-produits1" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour</button>
        <h2 style="text-align: center;">🍫 Hash</h2>
        
        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Photo" alt="Static" class="product-img">
            <p><strong>Static No Farm</strong></p>
            
            <select id="choix-produit-1" class="input-field" style="background-color: white; color: black; margin-bottom: 15px;">
                <option value="45" data-nom="Static (5g)">⚖️ 5 gramme - 45€</option>
                <option value="80" data-nom="Static (10g)">⚖️ 10 grammes - 80€</option>
                <option value="400" data-nom="Static (50g)">⚖️ 50 grammes - 400€</option>
            </select>

            <button onclick="ajouterChoixAuPanier('choix-produit-1')">Ajouter au panier</button>
        </div>
    </div>

    <div id="page-accessoires" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Retour</button>
        <h2 style="text-align: center;">❄️ Zip</h2>
        
        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Photo" alt="Zipette" class="product-img">
            <p><strong>Zipette - ??€</strong></p>
            <button onclick="addToCart('Zipette', 0)">Ajouter au panier</button>
        </div>
    </div>

    <div id="page-cart" class="page">
        <button class="btn-retour" onclick="ouvrirPage('page-categories')">⬅️ Continuer mes achats</button>
        <h2 style="text-align: center;">🛒 Mon Panier</h2>
        
        <div class="product">
            <p>Vous avez <strong><span id="cart-count-page">0</span> article(s)</strong>.</p>
            <h3>Total : <span id="cart-total-page">0</span>€</h3>
        </div>

        <h3 style="margin-top: 20px;">📍 Informations de livraison</h3>
        <textarea id="client-info" class="input-field" placeholder="Votre adresse..." rows="2"></textarea>
        
        <h3 style="margin-top: 10px;">💳 Moyen de paiement</h3>
        <select id="payment-method" class="input-field">
            <option value="Espèces">💵 Espèces à la livraison</option>
            <option value="Crypto">🪙 Crypto-monnaie</option>
            <option value="Carte Bancaire">💳 Carte Bancaire (Site externe)</option>
        </select>
        
        </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let cart = [];
        let total = 0;

        function ouvrirPage(idPage) {
            // Cache toutes les pages
            let pages = document.querySelectorAll('.page');
            pages.forEach(page => page.style.display = 'none');
            
            // Affiche la page demandée
            document.getElementById(idPage).style.display = 'block';
            window.scrollTo(0, 0); 

            // LOGIQUE DU PANIER ET DU BOUTON TELEGRAM
            if (idPage === 'page-cart') {
                // On est sur la page Panier : on cache le petit bouton flottant
                document.getElementById('cart-float').style.display = 'none';
                
                // Met à jour les textes de la page panier
                document.getElementById('cart-count-page').innerText = cart.length;
                document.getElementById('cart-total-page').innerText = total;

                // On affiche le gros bouton Telegram de validation (uniquement s'il y a des articles)
                if (cart.length > 0) {
                    tg.MainButton.setText(`Valider la commande (${total}€)`);
                    tg.MainButton.show();
                }
            } else {
                // On n'est PAS sur la page panier : on cache le gros bouton Telegram
                tg.MainButton.hide();
                
                // On réaffiche la petite pastille flottante (uniquement s'il y a des articles)
                if (cart.length > 0) {
                    document.getElementById('cart-float').style.display = 'block';
                }
            }
        }

        // --- NOUVEAU : Fonction pour lire le choix du poids ---
        function ajouterChoixAuPanier(idDuSelect) {
            let menu = document.getElementById(idDuSelect);
            let optionChoisie = menu.options[menu.selectedIndex];
            
            // On récupère le prix et le nom caché dans l'option
            let prix = parseFloat(optionChoisie.value); 
            let nom = optionChoisie.getAttribute('data-nom'); 
            
            // On envoie ces infos à ton panier existant !
            addToCart(nom, prix); 
        }

        function addToCart(name, price) {
            cart.push({name: name, price: price});
            total += price;
            
            // Met à jour le compteur du bouton flottant
            document.getElementById('cart-count-float').innerText = cart.length;
            
            // Fait apparaître le bouton flottant s'il était caché
            document.getElementById('cart-float').style.display = 'block';
            
            // Optionnel : petite vibration du téléphone quand on ajoute un article !
            tg.HapticFeedback.impactOccurred('light');
        }

        tg.MainButton.onClick(() => {
            let info = document.getElementById('client-info').value;
            let payment = document.getElementById('payment-method').value; 
            
            let commandeComplete = {
                articles: cart,
                infosClient: info,
                methodePaiement: payment 
            };
            
            tg.sendData(JSON.stringify(commandeComplete));
            tg.close();
        });
    </script>
</body>
</html>
