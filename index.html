<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* --- LE FOND ET L'AMBIANCE --- */
        body {
            /* Pense à mettre le vrai nom de ton image ici ! */
            background-image: url('fond-boutique.png?v=2'); 
            background-color: #0a0a0a; /* Noir profond par défaut */
            background-size: cover;
            background-position: top center;
            background-attachment: fixed;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            padding-top: 22vh; /* L'espace en haut pour laisser ton logo visible */
            padding-bottom: 80px; /* Espace en bas pour le bouton Telegram */
        }

        /* --- L'EFFET VERRE DÉPOLI (GLASSMORPHISM) --- */
        .glass-card {
            background: rgba(15, 15, 15, 0.7); /* Fond très sombre et transparent */
            backdrop-filter: blur(12px); /* Le floutage du fond */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 50, 50, 0.35); /* Contour rouge discret */
            border-radius: 20px;
            padding: 25px 20px;
            margin: 0 auto 25px auto;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        /* --- LES BOUTONS --- */
        .btn-red-glow {
            background: linear-gradient(135deg, rgba(220, 20, 36, 0.9), rgba(150, 0, 0, 0.9));
            color: white;
            border: 1px solid rgba(255, 100, 100, 0.5);
            border-radius: 50px;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); /* Lueur rouge */
            transition: all 0.2s ease;
        }

        .btn-red-glow:active {
            transform: scale(0.96);
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(30, 30, 30, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:active {
            background: rgba(50, 50, 50, 0.8);
        }

        /* --- LES TEXTES --- */
        h2 {
            color: #ff4d4d;
            letter-spacing: 2px;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
            text-transform: uppercase;
        }

        /* --- LES PRODUITS --- */
        .product-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Menus déroulants et champs de texte style Dark Mode */
        .input-dark {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 12px;
            width: 90%;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            outline: none;
        }

        /* --- LE PANIER FLOTTANT --- */
        #cart-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff4b4b, #cc0000);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(204, 0, 0, 0.5);
            cursor: pointer;
            z-index: 1000;
            display: none; /* Caché si vide */
        }
        #cart-count-float {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: white;
            color: #cc0000;
            border-radius: 50%;
            padding: 3px 8px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Gestion des pages */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="page-categories" class="page active">
        <div class="glass-card">
            <h2>Que cherchez-vous ?</h2>

            <button class="btn-red-glow" onclick="ouvrirPage('page-produits1')">
                🔥 Menu Produits
            </button>
            
            <button class="btn-secondary" onclick="ouvrirPage('page-infos')">
                ℹ️ Informations
            </button>
        </div>
    </div>


    <div id="page-produits1" class="page">
        <div class="glass-card" style="padding: 15px;">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Retour</button>
            
            <h2 style="color: white;">🔥 Nos Produits</h2>

            <div style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; margin-bottom: 20px;">
                <img src="https://via.placeholder.com/300x200/222222/ff4d4d?text=Photo+Produit+1" alt="Produit 1" class="product-img">
                <p style="font-weight: 600; font-size: 18px; margin: 5px 0;">Premium G</p>
                
                <select id="choix-produit-1" class="input-dark">
                    <option value="10" data-nom="Premium G (1g)">⚖️ 1 gramme - 10€</option>
                    <option value="45" data-nom="Premium G (5g)">⚖️ 5 grammes - 45€</option>
                    <option value="80" data-nom="Premium G (10g)">⚖️ 10 grammes - 80€</option>
                </select>

                <button class="btn-red-glow" style="padding: 10px; font-size: 14px;" onclick="ajouterChoixAuPanier('choix-produit-1')">Ajouter au panier</button>
            </div>

            <div>
                <img src="https://via.placeholder.com/300x200/222222/ff4d4d?text=Photo+Produit+2" alt="Produit 2" class="product-img">
                <p style="font-weight: 600; font-size: 18px; margin: 5px 0;">Filtre X</p>
                
                <select id="choix-produit-2" class="input-dark">
                    <option value="20" data-nom="Filtre X (2g)">⚖️ 2 grammes - 20€</option>
                    <option value="50" data-nom="Filtre X (5g)">⚖️ 5 grammes - 50€</option>
                </select>

                <button class="btn-red-glow" style="padding: 10px; font-size: 14px;" onclick="ajouterChoixAuPanier('choix-produit-2')">Ajouter au panier</button>
            </div>

        </div>
    </div>


    <div id="page-infos" class="page">
        <div class="glass-card" style="text-align: left;">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Retour</button>
            
            <h2 style="text-align: center;">ℹ️ Informations</h2>
            
            <p style="color: #ff4d4d; font-weight: bold; margin-bottom: 5px;">🕒 Horaires</p>
            <p style="font-size: 14px; color: #ccc;">Ouvert tous les jours de 10h à 22h.</p>
            
            <hr style="border-color: rgba(255,255,255,0.1); margin: 15px 0;">
            
            <p style="color: #ff4d4d; font-weight: bold; margin-bottom: 5px;">💳 Paiement</p>
            <p style="font-size: 14px; color: #ccc;">Espèces à la livraison ou Crypto.</p>
        </div>
    </div>


    <div id="page-cart" class="page">
        <div class="glass-card">
            <button class="btn-secondary" style="width: auto; padding: 8px 15px; margin-bottom: 20px;" onclick="ouvrirPage('page-categories')">⬅️ Retour Boutique</button>
            
            <h2>🛒 Mon Panier</h2>
            
            <div id="cart-items-list" style="margin-bottom: 20px; text-align: left;"></div>
            
            <h3 style="border-top: 1px solid rgba(255,50,50,0.3); padding-top: 15px; color: white;">Total : <span id="cart-total-page" style="color: #ff4d4d;">0</span>€</h3>

            <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
            
            <p style="text-align: left; margin-bottom: 5px; font-size: 14px; color: #aaa;">📍 Informations de livraison :</p>
            <textarea id="client-info" class="input-dark" rows="3" placeholder="Adresse complète, code porte, ville..."></textarea>
            
            <p style="text-align: left; margin-bottom: 5px; font-size: 14px; color: #aaa;">💳 Moyen de paiement :</p>
            <select id="payment-method" class="input-dark">
                <option value="Espèces">Espèces à la livraison</option>
                <option value="Crypto">Crypto (BTC / USDT)</option>
            </select>
        </div>
    </div>


    <div id="cart-float" onclick="ouvrirPage('page-cart')">
        🛒<span id="cart-count-float">0</span>
    </div>


    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Ouvre l'app en grand

        let cart = [];
        let total = 0;

        // Fonction pour changer de page
        function ouvrirPage(idPage) {
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(idPage).classList.add('active');

            // Afficher le bouton Telegram uniquement sur le panier
            if(idPage === 'page-cart' && cart.length > 0) {
                tg.MainButton.setText(`Valider la commande (${total}€)`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }
        }

        // Fonction pour lire le menu déroulant (Poids/Prix)
        function ajouterChoixAuPanier(idDuSelect) {
            let menu = document.getElementById(idDuSelect);
            let optionChoisie = menu.options[menu.selectedIndex];
            
            let prix = parseFloat(optionChoisie.value); 
            let nom = optionChoisie.getAttribute('data-nom'); 
            
            addToCart(nom, prix); 
        }

        // Fonction pour ajouter au panier en groupant les quantités
        function addToCart(name, price) {
            let articleExistant = cart.find(item => item.name === name);

            if (articleExistant) {
                articleExistant.quantity += 1;
            } else {
                cart.push({name: name, price: price, quantity: 1});
            }
            
            total += price;
            afficherPanier(); 
            
            document.getElementById('cart-float').style.display = 'flex';
            tg.HapticFeedback.impactOccurred('light'); // Vibration
        }

        // Fonction pour retirer un article du panier
        function retirerDuPanier(index) {
            let item = cart[index];
            
            total -= item.price; 
            item.quantity -= 1; 
            
            if (item.quantity === 0) {
                cart.splice(index, 1);
            }
            
            afficherPanier();
            tg.HapticFeedback.impactOccurred('medium');
        }

        // Fonction pour mettre à jour l'affichage
        function afficherPanier() {
            let liste = document.getElementById('cart-items-list');
            liste.innerHTML = ""; 

            let nombreArticles = 0;

            cart.forEach((item, index) => {
                nombreArticles += item.quantity;
                let prixLigne = item.price * item.quantity;
                
                liste.innerHTML += `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                        <span style="font-size: 14px;">${item.name} <strong style="color:#ff4d4d;">(x${item.quantity})</strong> <br> <strong>${prixLigne}€</strong></span>
                        <button onclick="retirerDuPanier(${index})" style="background: rgba(255,50,50,0.2); border: 1px solid #ff4d4d; color: white; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;">❌</button>
                    </div>
                `;
            });

            document.getElementById('cart-total-page').innerText = total;
            document.getElementById('cart-count-float').innerText = nombreArticles;

            if (nombreArticles > 0 && document.getElementById('page-cart').classList.contains('active')) {
                tg.MainButton.setText(`Valider la commande (${total}€)`);
                tg.MainButton.show();
            } else {
                tg.MainButton.hide();
            }

            if (nombreArticles === 0) {
                document.getElementById('cart-float').style.display = 'none';
                if(document.getElementById('page-cart').classList.contains('active')) {
                    liste.innerHTML = "<p style='text-align:center; color:#aaa;'>Votre panier est vide.</p>";
                }
            }
        }

        // Envoi de la commande à ton Bot Node.js
        tg.MainButton.onClick(() => {
            let info = document.getElementById('client-info').value;
            let payment = document.getElementById('payment-method').value; 
            
            if (info.trim() === "") {
                tg.showAlert("Merci de remplir votre adresse de livraison !");
                return;
            }

            // On "déplie" le panier pour que le bot reçoive bien toutes les lignes
            let articlesPourLeBot = [];
            cart.forEach(item => {
                for (let i = 0; i < item.quantity; i++) {
                    articlesPourLeBot.push({name: item.name, price: item.price});
                }
            });
            
            let commandeComplete = {
                articles: articlesPourLeBot,
                infosClient: info,
                methodePaiement: payment 
            };
            
            tg.sendData(JSON.stringify(commandeComplete));
            tg.close();
        });
    </script>
</body>
</html>
